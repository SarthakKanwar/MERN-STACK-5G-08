<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Database</title>
    <link rel="stylesheet" href="moviesdb.css">
</head>
<body>

<div id="container">

    <!-- Form Section -->
    <div id="form-container">

        <form id="movie-form">

            <div>
                <label for="url">Image Url</label>
                <input type="text" id="url" placeholder="Enter image url">
            </div>

            <div>
                <label for="title">Movie Title</label>
                <input type="text" id="title" placeholder="Enter movie title">
            </div>

            <div>
                <label for="rating">Rating</label>
                <input type="number" id="rating" placeholder="Enter rating">
            </div>

            <div>
                <button id="submit" type="submit">Submit</button>
            </div>

        </form>

    </div>

    <!-- Movie Cards -->
    <div id="movieCards"></div>

</div>

<script src="moviesdb.js"></script>

</body>
</html>
