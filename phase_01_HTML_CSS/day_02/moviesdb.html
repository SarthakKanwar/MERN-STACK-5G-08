<!DOCTYPE html>

<body>
<div id="container">

    <!-- Form Section -->
    <div id="form-container">

        <form id="movie-form">

            <div>
                <label for="title">Movie Title</label>
                <input type="text" id="title" placeholder="Enter movie title">
            </div>

            <div>
                <label for="genre">Genre</label>
                <input type="text" id="genre" placeholder="Enter genre">
            </div>

            <div>
                <label for="year">Release Year</label>
                <input type="number" id="year" placeholder="Enter release year">
            </div>

            <div>
                <label for="rating">Rating</label>
                <input type="number" id="rating" placeholder="Enter rating">
            </div>

            <div>
                <button type="submit">Add Movie</button>
            </div>

        </form>

    </div>
