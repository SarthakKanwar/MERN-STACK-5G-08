<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Khan Card</title>

    <link rel="stylesheet" href="postcard.css">
</head>

<body>

    <div class="card">

        <div class="image-box">
            <img src="https://c.saavncdn.com/artists/Shah_Rukh_Khan_500x500.jpg" alt="King Khan">
        </div>

        <h2>~ <b>King Khan</b> ~</h2>

        <div class="reaction">

            <button id="likeBtn" class="emoji">
                👍
            </button>

            <span>
                Count :
                <span id="likeCount">0</span>
            </span>

        </div>

        <div class="reaction">

            <button id="dislikeBtn" class="emoji">
                👎
            </button>

            <span>
                Count :
                <span id="dislikeCount">0</span>
            </span>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
